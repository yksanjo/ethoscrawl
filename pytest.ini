[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Addopts (default command line options)
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    network: marks tests that require network access
    privacy: marks tests for privacy features
    ethics: marks tests for ethical framework
    async_test: marks tests that use async/await
    unit: unit tests (default)
    e2e: end-to-end tests

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ImportWarning
    ignore::ResourceWarning

# Test output
console_output_style = classic
verbosity = 1

# Coverage configuration (if coverage is used)
# [coverage:run]
# source = src
# omit = 
#     */tests/*
#     */__pycache__/*
#     */setup.py

# [coverage:report]
# exclude_lines =
#     pragma: no cover
#     def __repr__
#     if self.debug:
#     raise AssertionError
#     raise NotImplementedError
#     if 0:
#     if __name__ == .__main__.:
#     class .*\\bProtocol\\):
#     @(abc\\.)?abstractmethod

# [coverage:html]
# directory = htmlcov

# Async configuration
asyncio_mode = auto

# Timeouts
timeout = 30
timeout_method = thread